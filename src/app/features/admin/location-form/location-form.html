<div class="bg-gray-800 p-6 rounded-lg shadow-lg max-w-2xl mx-auto">
  <h2 class="text-2xl font-bold mb-6 text-white">
    {{ isEditMode() ? 'Edit' : 'New' }} Workplace
  </h2>
  <form [formGroup]="locationForm" (ngSubmit)="onSubmit()">
    <div class="space-y-4">
      <div>
        <label class="block text-gray-300 text-sm font-bold mb-2">Name</label>
        <input formControlName="name" class="form-input" placeholder="e.g. Main Office">
      </div>

      <!-- Map picker replaces manual lat/lng inputs -->
      <app-address-map-picker
        label="Work Location Address"
        placeholder="Search for an address..."
        [initialLatitude]="initialLat()"
        [initialLongitude]="initialLng()"
        [initialAddress]="initialAddress()"
        (addressSelected)="onAddressSelected($event)"
      />

      <div>
        <label class="block text-gray-300 text-sm font-bold mb-2">Geofence Radius (meters)</label>
        <input formControlName="geofenceRadiusMeters" type="number" class="form-input" placeholder="100">
        <p class="text-gray-500 text-xs mt-1">Workers must be within this radius to clock in/out.</p>
      </div>
    </div>

    <div class="flex items-center gap-4 mt-6">
      <a routerLink="/admin/locations" class="bg-gray-600 hover:bg-gray-700 text-white text-center font-bold py-2 px-4 rounded w-full">Cancel</a>
      <button type="submit" [disabled]="locationForm.invalid" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded w-full disabled:bg-gray-500">
        Save
      </button>
    </div>
  </form>
</div>
